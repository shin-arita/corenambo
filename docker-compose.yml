services:
  frontend:
    image: corenambo-frontend:1.0.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: corenambo-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_started
    command: sh -c "npm ci && npm run dev"

  api:
    image: corenambo-api:1.0.0
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: corenambo-api
    working_dir: /app
    volumes:
      - ./api:/app
      - ./db:/db
      - go_pkg_mod:/go/pkg/mod
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      APP_ENV: ${APP_ENV:-local}
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-app_db}?sslmode=${DB_SSLMODE:-disable}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-app_db}
      DB_USER: ${POSTGRES_USER:-app_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      SMTP_HOST: mail
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      RATE_LIMIT_IP_PER_MINUTE: ${RATE_LIMIT_IP_PER_MINUTE:-5}
      RATE_LIMIT_EMAIL_PER_5MIN: ${RATE_LIMIT_EMAIL_PER_5MIN:-1}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_MINUTES: ${JWT_ACCESS_EXPIRES_MINUTES:-15}
      JWT_REFRESH_EXPIRES_HOURS: ${JWT_REFRESH_EXPIRES_HOURS:-168}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      WORKER_STUCK_TIMEOUT_MINUTES: ${WORKER_STUCK_TIMEOUT_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
      redis:
        condition: service_started
    command: sh -c "go mod download && air -c .air.toml"

  db:
    image: corenambo-db:1.0.0
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: corenambo-db
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mail:
    image: axllent/mailpit:v1.21.0
    container_name: corenambo-mail
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      TZ: ${TZ:-Asia/Tokyo}

  redis:
    image: redis:7.2-alpine
    container_name: corenambo-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      TZ: ${TZ:-Asia/Tokyo}

  worker:
    image: corenambo-worker:1.0.0
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./api:/app
    command: ["./worker"]
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
      redis:
        condition: service_started
    restart: always
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      DATABASE_URL: postgres://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-app_db}?sslmode=disable

volumes:
  db_data:
  frontend_node_modules:
  go_pkg_mod:
